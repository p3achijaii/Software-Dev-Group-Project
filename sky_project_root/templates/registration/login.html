<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login — Sky Engineering</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 40px; width: 340px; }
        h2 { color: #f1f5f9; margin: 0 0 24px; font-size: 1.2rem; }
        label { display: block; color: #94a3b8; font-size: 0.8rem; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #f1f5f9; font-size: 0.9rem; box-sizing: border-box; margin-bottom: 16px; }
        button { width: 100%; padding: 10px; background: #3b82f6; border: none; border-radius: 6px; color: white; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #2563eb; }
        .error { color: #f87171; font-size: 0.8rem; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Sky Engineering — Sign in</h2>
        {% if form.errors %}
            <div class="error">Invalid username or password.</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label>Username</label>
            <input type="text" name="username" autofocus>
            <label>Password</label>
            <input type="password" name="password">
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
